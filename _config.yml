title: Vishnu's Blog
description: Automated posts on news, health, tech & Kerala/India insights
baseurl: "/thinker"   # MUST match your repo name (the /thinker part in URL)
url: "https://vishnu-blog.github.io"

# Important: Enable posts from /posts folder
collections:
  posts:
    output: true
    permalink: /posts/:name/   # Clean URL: /posts/slug/ (no .md)

# Defaults for all posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Optional: Show future posts if testing
future: true
show_drafts: false
