title: Vishnu's Blog
description: Automated news & insights from Kerala/India
baseurl: "/thinker"          # MUST match your repo name/path
url: "https://vishnu-blog.github.io"

# Enable posts collection from /posts folder
collections:
  posts:
    output: true
    permalink: /posts/:name/   # Clean URL: /posts/slug/ (no .md)

# Defaults for posts
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post

# Optional: theme or plugins if you want later
# theme: minima
